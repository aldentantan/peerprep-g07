services:
  user-service:
    build: ./user-service
    container_name: user-service
    environment:
      - PORT=${USER_SERVICE_PORT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${USER_DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    ports:
      - "${USER_SERVICE_PORT}:${USER_SERVICE_PORT}"
    restart: unless-stopped

  question-service:
    build: ./question-service
    container_name: question-service
    environment:
      - PORT=${QUESTION_SERVICE_PORT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${QUESTION_DB_NAME}
      - USER_SERVICE_URL=${USER_SERVICE_URL}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - LEETCODE_API_URL=${LEETCODE_API_URL}
      - LEETCODE_SYNC_CRON=${LEETCODE_SYNC_CRON}
      - LEETCODE_FETCH_LIMIT=${LEETCODE_FETCH_LIMIT}
      - LEETCODE_REQUEST_DELAY_MS=${LEETCODE_REQUEST_DELAY_MS}
      - LEETCODE_MAX_RETRIES=${LEETCODE_MAX_RETRIES}
      - LEETCODE_RETRY_DELAY_MS=${LEETCODE_RETRY_DELAY_MS}
      - LEETCODE_RUN_ON_START=${LEETCODE_RUN_ON_START}
      - LEETCODE_BATCH_SIZE=${LEETCODE_BATCH_SIZE}
      - LEETCODE_RATE_LIMIT_DELAY_MS=${LEETCODE_RATE_LIMIT_DELAY_MS}

    ports:
      - "${QUESTION_SERVICE_PORT}:${QUESTION_SERVICE_PORT}"
    depends_on:
      leetcode-api:
        condition: service_started
    restart: unless-stopped

  leetcode-api:
    image: alfaarghya/alfa-leetcode-api:2.0.3
    container_name: leetcode-api
    restart: unless-stopped

  matching-service:
    build: ./matching-service
    container_name: matching-service
    environment:
      PORT: ${MATCHING_SERVICE_PORT}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      COLLAB_REDIS_URL: redis://collab-redis:6379
      QUESTION_SERVICE_URL: http://question-service:${QUESTION_SERVICE_PORT}
    ports:
      - "${MATCHING_SERVICE_PORT}:${MATCHING_SERVICE_PORT}"
    depends_on:
      redis:
        condition: service_healthy
      collab-redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  collab-redis:
    image: redis:7-alpine
    container_name: collab-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  collaboration-service:
    build: ./collaboration-service/backend
    container_name: collaboration-service
    environment:
      - REDIS_URL=redis://collab-redis:6379
      - QUESTION_SERVICE_URL=http://question-service:${QUESTION_SERVICE_PORT}
    ports:
      - "${COLLAB_SERVICE_PORT}:3000"
      - "${COLLAB_YJS_WS_PORT}:8081"
    depends_on:
      collab-redis:
        condition: service_healthy
    restart: unless-stopped

  piston:
    image: ghcr.io/engineer-man/piston:latest
    container_name: piston
    privileged: true
    volumes:
      - piston-data:/piston
    tmpfs:
      - /tmp:exec
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2000/api/v2/runtimes || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  piston-init:
    image: curlimages/curl:latest
    container_name: piston-init
    depends_on:
      piston:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        for pkg in \
          '{"language":"python","version":"3.10.0"}' \
          '{"language":"javascript","version":"18.15.0"}' \
          '{"language":"typescript","version":"5.0.3"}' \
          '{"language":"java","version":"15.0.2"}' \
          '{"language":"c++","version":"10.2.0"}' \
          '{"language":"go","version":"1.16.2"}' \
          '{"language":"ruby","version":"3.0.1"}' \
          '{"language":"csharp","version":"6.12.0"}'; do
          echo "Installing $$pkg..."
          curl -sf -X POST http://piston:2000/api/v2/packages \
            -H "Content-Type: application/json" -d "$$pkg" && echo " OK" || echo " FAILED"
        done
        echo "All runtimes installed."
    restart: "no"

  code-execution-service:
    build: ./code-execution-service
    container_name: code-execution-service
    environment:
      - PORT=${CODE_EXECUTION_PORT}
      - PISTON_URL=http://piston:2000
    ports:
      - "${CODE_EXECUTION_PORT}:${CODE_EXECUTION_PORT}"
    depends_on:
      piston-init:
        condition: service_completed_successfully
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    environment:
      - PORT=${GATEWAY_PORT}
      - USER_SERVICE_URL=${USER_SERVICE_URL}
      - QUESTION_SERVICE_URL=${QUESTION_SERVICE_URL}
      - MATCHING_SERVICE_URL=${MATCHING_SERVICE_URL}
      - COLLAB_SERVICE_URL=${COLLAB_SERVICE_URL}
      - COLLAB_WS_URL=${COLLAB_WS_URL}
      - CODE_EXECUTION_SERVICE_URL=${CODE_EXECUTION_SERVICE_URL}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "${GATEWAY_PORT}:${GATEWAY_PORT}"
    depends_on:
      - matching-service
      - collaboration-service
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${GATEWAY_URL}
        VITE_YJS_WS_URL: ${COLLAB_YJS_WS_URL}
        VITE_CHAT_WS_URL: ${COLLAB_CHAT_WS_URL}
    container_name: frontend
    ports:
      - "80:${FRONTEND_PORT}"
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  user-postgres-data:
  piston-data:
  question-postgres-data:
